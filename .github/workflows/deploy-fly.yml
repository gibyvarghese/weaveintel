name: Deploy to Fly.io

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - 'deploy/**'
      - 'Dockerfile'
      - 'fly.toml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Fly.io
        uses: superfly/flyctl-actions/setup-flyctl@master

      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
