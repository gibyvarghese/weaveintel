name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Unit + Integration tests
        run: npm run test
        env:
          JWT_SECRET: ci-test-secret

      # Playwright e2e tests require a running server — run separately.
      # Container executor integration tests require Docker — gate behind CI_DOCKER=1.
