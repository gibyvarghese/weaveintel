name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Type check
        run: npm run typecheck

      # Typecheck the examples against the built workspace so a breaking API change
      # in a package is caught by its example. (test:examples runs `turbo build` first,
      # so the reference app in apps/ is present — cached from the Build step above.)
      - name: Typecheck examples
        run: npm run test:examples

      - name: Public API Boundary Check
        run: npm run check:api-boundaries

      - name: No app-brand leaks in the framework
        run: npm run check:no-app-brand

      - name: Unit + Integration tests
        # Run one package's suite at a time: the GitHub runner has ~2 cores, and
        # fanning out ~10 package test suites in parallel starves the heavy STRESS
        # tests (9M-object builds, 2000-note fan-outs) past their timeouts. Serial
        # package execution gives each suite the whole runner and removes the flake.
        run: npx turbo test --concurrency=1
        env:
          JWT_SECRET: ci-test-secret
          # Several suites spin up a throwaway Postgres via Testcontainers. The heavy CPU-bound
          # STRESS tests (9M-object builds, 2000-note fan-outs, 50k-key migrations) block the event
          # loop long enough that the Testcontainers Ryuk reaper's heartbeat lapses and it kills the
          # container mid-test — surfacing as Postgres 57P01 ("terminating connection due to
          # administrator command") even though every assertion passed. The runner VM is ephemeral
          # and each suite stops its own container in afterAll, so the reaper is unnecessary here.
          TESTCONTAINERS_RYUK_DISABLED: true

      # Playwright e2e tests require a running server — run separately.
      # Container executor integration tests require Docker — gate behind CI_DOCKER=1.
