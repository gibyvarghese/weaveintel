# Release — publishes the @weaveintel/* libraries to npm via Changesets.
#
# HOW IT WORKS
#   • Contributors add a changeset in their PR (`npx changeset`); see .changeset/README.md.
#   • On push to main, the Changesets action either:
#       (a) opens/updates a "Version Packages" PR (applies pending changesets, bumps versions,
#           writes CHANGELOGs) when changesets are pending, or
#       (b) publishes the freshly-bumped packages to npm when that PR is merged (no changesets left).
#   • Each published package is versioned INDEPENDENTLY (SemVer). See VERSIONING.md.
#
# TRUSTED PUBLISHING (OIDC) — no NPM_TOKEN
#   Publishing uses npm Trusted Publishing (GA July 2025): the `id-token: write` permission lets npm
#   mint a short-lived, workflow-scoped token from GitHub's OIDC identity, and NPM_CONFIG_PROVENANCE
#   attaches a signed provenance attestation to every publish. Requires Node ≥22 / npm ≥11.5.1.
#
#   ONE-TIME OWNER SETUP (on npmjs.com, per package or org — cannot be automated here):
#     For each @weaveintel/* package → Settings → "Trusted Publishing" → add a GitHub Actions publisher:
#       Repository: gibyvarghese/weaveintel   Workflow: release.yml   Environment: (leave blank)
#     Until this is configured owner-side, `changeset publish` will fall back to token auth and fail.

name: Release

on:
  push:
    branches:
      - main

# Least privilege at the top; the job widens only what it needs.
permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create tags/commits + the Version Packages PR branch
      pull-requests: write # open/update the Version Packages PR
      id-token: write # OIDC → npm Trusted Publishing + provenance
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Changesets needs full history to compute what changed

      - uses: actions/setup-node@v7
        with:
          node-version: 22 # Trusted Publishing needs Node ≥22 / npm ≥11.5.1
          registry-url: https://registry.npmjs.org

      # Ensure npm is new enough for OIDC Trusted Publishing.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create Release PR or publish to npm
        uses: changesets/action@v1
        with:
          version: npm run ci:version # applies changesets (opens the Version Packages PR)
          publish: npm run ci:publish # publishes when there are no pending changesets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true" # attach provenance attestation on publish
