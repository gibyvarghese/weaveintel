name: Mobile CI

on:
  push:
    branches: [main]
    paths:
      - 'clients/mobile/**'
      - 'clients/api-client/**'
      - 'clients/tokens/**'
      - '.github/workflows/mobile-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'clients/mobile/**'
      - 'clients/api-client/**'
      - 'clients/tokens/**'
      - '.github/workflows/mobile-ci.yml'

concurrency:
  group: mobile-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Pure logic unit tests (Node, no device) ────────────────────────────
  test-lib:
    name: Unit tests (lib)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install root workspace deps
        run: npm ci

      - name: Build tokens package
        run: npm run build --workspace=clients/tokens

      - name: Build api-client package
        run: npm run build --workspace=clients/api-client

      - name: Run mobile lib tests
        run: npm test --workspace=clients/mobile

      - name: Run api-client tests
        run: npm test --workspace=clients/api-client

  # ── 2. TypeScript type-check (pure lib layer, Node-safe) ──────────────────
  typecheck:
    name: Typecheck (lib)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install root workspace deps
        run: npm ci

      - name: Build tokens package
        run: npm run build --workspace=clients/tokens

      - name: Build api-client package
        run: npm run build --workspace=clients/api-client

      - name: Type-check mobile lib layer
        run: npm run typecheck:lib --workspace=clients/mobile

  # ── 3. EAS iOS build (preview channel, on push to main only) ─────────────
  eas-ios:
    name: EAS iOS build (preview)
    runs-on: ubuntu-latest
    # Only on push to main — not on PRs — to conserve EAS build minutes.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test-lib, typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install root workspace deps
        run: npm ci

      - name: Setup Expo + EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS build (iOS preview)
        working-directory: clients/mobile
        run: eas build --platform ios --profile preview --non-interactive --no-wait
        env:
          EXPO_PUBLIC_APP_ENV: preview
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

  # ── 4. EAS Android build (preview channel, on push to main only) ──────────
  eas-android:
    name: EAS Android build (preview)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test-lib, typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install root workspace deps
        run: npm ci

      - name: Setup Expo + EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS build (Android preview)
        working-directory: clients/mobile
        run: eas build --platform android --profile preview --non-interactive --no-wait
        env:
          EXPO_PUBLIC_APP_ENV: preview
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
