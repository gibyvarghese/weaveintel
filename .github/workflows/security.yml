name: Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run weekly on Mondays at 02:00 UTC
    - cron: '0 2 * * 1'

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ── CodeQL static analysis ─────────────────────────────────────────────────
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Scope the scan to shipped library source (packages/, minus tests/dist) and keep the
          # security-extended query suite. See .github/codeql/codeql-config.yml for the rationale.
          config-file: ./.github/codeql/codeql-config.yml

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}

  # ── npm audit gate ─────────────────────────────────────────────────────────
  npm-audit:
    name: npm Audit (Critical/High)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      # Hard gate: framework runtime deps only. --omit=dev excludes test-tool
      # vulns (vitest, vite). Mobile build-chain (Expo) is audited separately
      # below as informational — those packages are upstream-unfixed build
      # tools, not runtime, and must not block releases.
      - name: Audit framework (fail on high/critical)
        run: |
          npm audit --omit=dev --audit-level=high \
            --json | tee audit-framework.json
          npm audit --omit=dev --audit-level=high

      # Informational: mobile build-chain (Expo packages have upstream unfixed
      # highs in @xmldom/xmldom, cacache, tar etc). Report only — do not block.
      - name: Audit mobile workspace (informational)
        continue-on-error: true
        run: |
          npm audit --workspace=clients/mobile --omit=dev \
            --json | tee audit-mobile.json || true
          echo "Mobile workspace audit complete (non-blocking)"

      - name: Upload audit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-results
          path: |
            audit-framework.json
            audit-mobile.json
          retention-days: 14

  # ── Secret scanning (gitleaks) ─────────────────────────────────────────────
  gitleaks:
    name: Secret Scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ── Container / dependency vulnerability scan (Trivy) ─────────────────────
  trivy:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@cf5c088a69634cd13ccddc735d7926162c31f9a6
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Upload Trivy SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Fail on CRITICAL,HIGH vulnerabilities
        uses: aquasecurity/trivy-action@cf5c088a69634cd13ccddc735d7926162c31f9a6
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: '1'
          format: table
          # Only fail on vulnerabilities that have a fix available — mirrors the npm-audit gate's
          # policy that upstream-unfixed build-chain highs (Expo/mobile toolchain) must not block
          # releases. Fixable highs (e.g. undici) still fail the gate and must be remediated.
          ignore-unfixed: true

  # ── SBOM generation (CycloneDX) ────────────────────────────────────────────
  sbom:
    name: Generate SBOM (CycloneDX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install CycloneDX npm plugin
        run: npm install --no-save @cyclonedx/cyclonedx-npm

      - name: Generate SBOM
        run: npx @cyclonedx/cyclonedx-npm --output-format JSON --output-file sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.json
          retention-days: 90

  # ── SPDX header coverage check ────────────────────────────────────────────
  spdx-check:
    name: SPDX License Header Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check SPDX headers on package entry points
        run: |
          MISSING=$(find packages -name 'index.ts' -not -path '*/node_modules/*' \
            | xargs grep -rL 'SPDX-License-Identifier' 2>/dev/null || true)
          if [ -n "$MISSING" ]; then
            echo "❌ Files missing SPDX-License-Identifier header:"
            echo "$MISSING"
            exit 1
          fi
          echo "✅ All package entry points have SPDX headers"
