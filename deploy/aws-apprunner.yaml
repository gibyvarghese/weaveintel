# AWS App Runner configuration for geneWeave
#
# Deploy with the AWS Console or CLI:
#   aws apprunner create-service --cli-input-json file://deploy/aws-apprunner.json
#
# Or use this file with `apprunner.yaml` in the repo root for source-based deploys.

version: 1.0
runtime: nodejs20
build:
  commands:
    build:
      - npm ci
      - npx turbo build
run:
  command: npx tsx deploy/server.ts
  network:
    port: 3500
    env: PORT
  env:
    - name: NODE_ENV
      value: production
    - name: DATABASE_PATH
      value: ./data/geneweave.db
